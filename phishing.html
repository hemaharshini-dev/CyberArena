<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Phishing Detective</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <h2>🕵️ Phishing Detective</h2>

      <h3 id="progressText"></h3>
      <h3 id="xpDisplay">XP: 0</h3>

      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>

      <h3 id="timer">⏱️ Time Left: 10s</h3>

      <!-- EMAIL UI -->
      <div class="email-box">
        <p><strong>From:</strong> <span id="sender"></span></p>
        <p><strong>Subject:</strong> <span id="subject"></span></p>
        <hr />
        <p id="emailBody"></p>
        <p>
          <strong>Link:</strong>
          <span id="emailLink" class="link"></span>
        </p>

        <p id="urlPreview" class="preview"></p>
      </div>
      <div id="loginModal" class="modal">
        <div class="modal-content">
          <h3>🔐 Login Required</h3>

          <input type="text" placeholder="Username" />
          <input type="password" placeholder="Password" />

          <button id="loginBtn">Login</button>
        </div>
      </div>

      <!-- OPTIONS -->
      <div id="options"></div>

      <!-- FEEDBACK -->
      <div id="feedback"></div>

      <button id="nextBtn" style="display: none">Next</button>
    </div>

    <script src="js/common.js"></script>
    <script src="js/phishing.js"></script>
  </body>
</html>
