<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Phishing Detective</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="crt">
    <div class="container">
      <button class="back-btn" onclick="goHome()">← Back</button>
      <h2>🕵️ Phishing Detective</h2>

      <h3 id="progressText"></h3>
      <h3 id="xpDisplay">XP: 0</h3>

      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>

      <h3 id="timer">⏱️ Time Left: 10s</h3>

      <!-- EMAIL UI -->
      <div class="email-header">
        <p>
          <strong>From:</strong> 
          <span id="sender" style="cursor: pointer; text-decoration: underline; color: var(--neon-cyan);" title="Click to inspect headers"></span>
          <div id="headerDetails" style="display: none; background: rgba(0,0,0,0.5); padding: 10px; margin-top: 5px; font-size: 10px; border: 1px dashed var(--neon-cyan);">
            <code>Authentication-Results: spf=fail; dkim=fail;</code><br>
            <code>X-Original-Sender: <span id="actualSender"></span></code>
          </div>
        </p>
        <p><strong>Subject:</strong> <span id="subject"></span></p>
      </div>
        <p id="emailBody"></p>
        <p>
          <strong>Link:</strong>
          <span id="emailLink" class="link"></span>
        </p>

        <p id="urlPreview" class="preview"></p>
      </div>
      <div id="loginModal" class="modal">
        <div class="modal-content">
          <h3>🔐 Login Required</h3>

          <input type="text" placeholder="Username" />
          <input type="password" placeholder="Password" />

          <button id="loginBtn" class="primary-btn">Login</button>
        </div>
      </div>

      <!-- OPTIONS -->
      <div id="options"></div>

      <!-- FEEDBACK -->
      <div id="feedback"></div>

      <button id="nextBtn" class="primary-btn" style="display: none">Next</button>
    </div>

    <script type="module">
      import { auth } from "./js/firebase.js";
      import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

      onAuthStateChanged(auth, (user) => {
        if (!user) {
          window.location.href = "login.html";
        }
      });
    </script>
    <script src="js/common.js"></script>
    <script type="module" src="js/phishing.js"></script>
  </body>
</html>
