<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CyberArena</title>
    <link rel="stylesheet" href="css/style.css" />

    <script type="module">
      import { auth } from "./js/firebase.js";
      import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

      onAuthStateChanged(auth, (user) => {
        if (!user) {
          window.location.href = "login.html";
        }
      });
    </script>
  </head>
  <body>
    <div class="container">
      <button class="logout-btn" onclick="logout()">Logout</button>
      <p id="userEmail"></p>
      <h1>🛡️ CyberArena</h1>
      <p>Select Your Mission</p>

      <div class="missions">
        <button onclick="startMission('phishing')">
          🕵️ Phishing Detective
        </button>
        <button onclick="startMission('social')">🎭 Social Engineering</button>
        <button onclick="startMission('ai')">🤖 AI Crime Lab</button>
        <button onclick="startMission('malware')">🧩 Malware Escape</button>
      </div>
    </div>
    <script type="module" src="js/auth.js"></script>
    <script src="js/common.js"></script>
  </body>
</html>
