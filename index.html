<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CyberArena</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="activity-ticker">
      <div id="tickerContent" class="ticker-content">
        📡 SCANNING FOR NETWORK ACTIVITY... 
      </div>
    </div>

    <div class="container">
      <div class="top-bar">
        <p id="userEmail"></p>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>

      <h1>🛡️ CyberArena</h1>
      <p>Select Your Mission</p>

      <div class="mission-section">
        <h3 class="section-title">🎭 Social Engineering</h3>
        <div class="missions">
          <button onclick="startMission('phishing')">
            🕵️ Phishing Detective
          </button>
          <button onclick="startMission('social')">🎭 Social Engineering</button>
          <button onclick="startMission('smishing')" class="new-mission">
            📱 Smishing Simulator
          </button>
        </div>
      </div>

      <div class="mission-section">
        <h3 class="section-title">💻 Technical Defense</h3>
        <div class="missions">
          <button onclick="startMission('ai')">🤖 AI Crime Lab</button>
          <button onclick="startMission('malware')">🧩 Malware Escape</button>
          <button onclick="startMission('password')" class="new-mission">
            🛡️ Password Lab
          </button>
          <button onclick="startMission('darkweb')" class="new-mission">
            🌐 Dark Web Market
          </button>
        </div>
      </div>

      <div class="mission-section">
        <h3 class="section-title">🛠️ Tools & Knowledge</h3>
        <div class="missions">
          <button onclick="startMission('creator')" class="new-mission">
            🧪 Mission Creator
          </button>
          <button onclick="startMission('wiki')" class="secondary-btn">
            📖 Cyber-Wiki
          </button>
        </div>
      </div>

      <hr />

      <div class="user-stats">
        <h2>📊 Your Profile</h2>
        <div class="profile-layout">
          <div class="xp-container">
            <p id="rankLabel" class="rank-label">Rank: Novice</p>
            <div class="progress-bar">
              <div id="userXPFill" style="width: 0%;"></div>
            </div>
            <p id="userXP">XP: Loading...</p>
            <p id="missionsCompleted">Missions Completed: Loading...</p>
          </div>
          
          <div class="achievement-gallery">
            <h3>🏅 Achievements</h3>
            <div id="badgeList" class="badge-list">
              <!-- Badges will be injected here -->
            </div>
          </div>
        </div>
      </div>

      <div class="leaderboard">
        <h2>🏆 Global Leaderboard</h2>
        <ul id="leaderboardList">
          <li>Loading...</li>
        </ul>
      </div>
    </div>

    <script type="module">
      import { auth, db } from "./js/firebase.js";
      import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
      import { getUserData } from "./js/xp.js";
      import { collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      async function loadLeaderboard() {
        try {
          const list = document.getElementById("leaderboardList");
          const q = query(collection(db, "users"), orderBy("xp", "desc"), limit(5));
          const querySnapshot = await getDocs(q);
          
          list.innerHTML = "";
          if (querySnapshot.empty) {
            list.innerHTML = "<li>No data available</li>";
            return;
          }

          querySnapshot.forEach((doc) => {
            const data = doc.data();
            const li = document.createElement("li");
            const name = data.email ? data.email.split('@')[0] : "Anonymous";
            li.innerHTML = `<span>${name}</span> <span>${data.xp || 0} XP</span>`;
            list.appendChild(li);
          });
        } catch (error) {
          console.error("Error loading leaderboard:", error);
          document.getElementById("leaderboardList").innerHTML = "<li>Failed to load leaderboard</li>";
        }
      }

      function startActivityTicker() {
        const activities = [
          "User 'CyberGhost' just neutralized a Malware threat!",
          "Alert: New Phishing campaign detected in the wild.",
          "Specialist 'NeonDefender' reached level 50!",
          "Community mission: 1,400 passwords successfully tested today.",
          "New training module: AI-generated deepfakes updated.",
          "Security Breach: Mock leak simulation found for 'corp.com'."
        ];
        
        const ticker = document.getElementById("tickerContent");
        let index = 0;
        
        setInterval(() => {
          ticker.innerText = activities[index];
          index = (index + 1) % activities.length;
        }, 5000);
      }

      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          window.location.href = "login.html";
        } else {
          try {
            document.getElementById("userEmail").innerText = user.email;
            const userData = await getUserData();
            if (userData) {
              const xp = userData.xp || 0;
              document.getElementById("userXP").innerText = `XP: ${xp}`;
              document.getElementById("missionsCompleted").innerText = `Missions Completed: ${userData.missionsCompleted || 0}`;
              
              // Rank Calculation
              let rank = "Novice";
              let nextXP = 100;
              let currentLevelXP = 0;
              
              if (xp >= 500) {
                rank = "Elite Guardian";
                nextXP = 1000;
                currentLevelXP = 500;
              } else if (xp >= 100) {
                rank = "Specialist";
                nextXP = 500;
                currentLevelXP = 100;
              }
              
              const progress = ((xp - currentLevelXP) / (nextXP - currentLevelXP)) * 100;
              document.getElementById("rankLabel").innerText = `Rank: ${rank}`;
              document.getElementById("userXPFill").style.width = `${Math.min(progress, 100)}%`;

              // Achievements Display
              const badgeList = document.getElementById("badgeList");
              badgeList.innerHTML = "";
              
              const possibleBadges = [
                { id: "rookie", name: "Rookie", icon: "🔰", threshold: 0 },
                { id: "detective", name: "Detective", icon: "🔍", threshold: 50 },
                { id: "shield", name: "Shield", icon: "🛡️", threshold: 200 },
                { id: "elite", name: "Elite", icon: "👑", threshold: 500 }
              ];

              possibleBadges.forEach(badge => {
                if (xp >= badge.threshold) {
                  const span = document.createElement("span");
                  span.className = "badge";
                  span.title = badge.name;
                  span.innerText = badge.icon;
                  badgeList.appendChild(span);
                }
              });
            }
            await loadLeaderboard();
            startActivityTicker();
          } catch (error) {
            console.error("Error loading user data:", error);
          }
        }
      });
    </script>
    <script type="module" src="js/auth.js"></script>
    <script src="js/common.js"></script>
  </body>
</html>
