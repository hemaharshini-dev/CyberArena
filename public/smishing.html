<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile Smishing Simulator</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .phone-frame {
        width: 300px;
        border: 12px solid #30363d;
        border-radius: 30px;
        margin: 0 auto;
        background: #0d1117;
        position: relative;
        overflow: hidden;
      }
      .phone-screen {
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .sms-bubble {
        background: #1f2937;
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 10px;
        font-size: 14px;
        text-align: left;
        cursor: grab;
        user-select: none;
        transition: transform 0.15s, box-shadow 0.15s;
      }
      .sms-bubble.dragging {
        opacity: 0.5;
        cursor: grabbing;
      }
      .sms-sender { font-weight: bold; margin-bottom: 5px; color: #00c3ff; }
      .sms-link { color: #f87171; text-decoration: underline; cursor: pointer; }
      .drop-bins {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-top: 20px;
      }
      .drop-bin {
        flex: 1;
        max-width: 180px;
        min-height: 80px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-family: var(--font-cyber);
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: transform 0.2s, box-shadow 0.2s;
        cursor: pointer;
      }
      .drop-bin.scam-bin {
        border: 2px dashed #f87171;
        color: #f87171;
        background: rgba(248,113,113,0.05);
      }
      .drop-bin.safe-bin {
        border: 2px dashed var(--neon-green);
        color: var(--neon-green);
        background: rgba(57,255,20,0.05);
      }
      .drop-bin.drag-over {
        transform: scale(1.05);
        box-shadow: 0 0 15px currentColor;
      }
      .qr-container {
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      .qr-mock {
        background: rgba(0, 243, 255, 0.05);
        border: 1px dashed var(--neon-cyan);
        border-radius: 6px;
        padding: 10px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        transition: box-shadow 0.2s;
      }
      .qr-mock:hover { box-shadow: 0 0 12px var(--neon-cyan); }
      .qr-tap-hint { font-size: 10px; color: var(--neon-cyan); letter-spacing: 1px; }
      .qr-url-reveal {
        background: rgba(0,0,0,0.6);
        border: 1px solid #f87171;
        border-radius: 4px;
        padding: 6px 10px;
        text-align: center;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <button class="back-btn" onclick="goHome()">← Back</button>
      <h2 id="pageTitle" style="margin:0 0 4px;">📱 Smishing Simulator</h2>
      <p id="gameSubtitle" style="margin:0 0 12px;font-size:13px;">Drag the SMS into the correct bin, or use the buttons on the right.</p>

      <div id="gameArea" style="display:flex;gap:30px;align-items:flex-start;justify-content:center;flex-wrap:wrap;">

        <!-- Left: Phone -->
        <div class="phone-frame">
          <div class="phone-screen" id="phoneScreen">
            <!-- Messages will load here -->
          </div>
        </div>

        <!-- Right: Bins + Feedback -->
        <div id="binsPanel" style="display:flex;flex-direction:column;gap:16px;justify-content:center;min-width:200px;flex:1;max-width:320px;">
          <div class="drop-bin scam-bin" id="scamBin"
            role="button" aria-label="Drop here to flag as scam"
            ondragover="event.preventDefault(); this.classList.add('drag-over');"
            ondragleave="this.classList.remove('drag-over');"
            ondrop="handleDrop(true); this.classList.remove('drag-over');">
            🚨 Scam
          </div>
          <div class="drop-bin safe-bin" id="safeBin"
            role="button" aria-label="Drop here to mark as safe"
            ondragover="event.preventDefault(); this.classList.add('drag-over');"
            ondragleave="this.classList.remove('drag-over');"
            ondrop="handleDrop(false); this.classList.remove('drag-over');">
            ✅ Safe
          </div>
          <div id="feedback" style="min-height:44px;" aria-live="polite"></div>
        </div>

      </div>

      <!-- Completion screen — outside the two-column layout -->
      <div id="completionArea" style="display:none;"></div>
    </div>

    <script type="module">
      import { auth } from "./js/firebase.js";
      import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
      onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "login.html"; });
    </script>
    <script src="js/common.js"></script>
    <script type="module" src="js/smishing.js"></script>
  </body>
</html>
