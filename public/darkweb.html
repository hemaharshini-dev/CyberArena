<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dark Web Simulator - CyberArena</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="crt">
    <div class="container">
      <button class="back-btn" onclick="goHome()">← Back</button>
      <h2>🌐 Dark Web Market</h2>
      <p>Search the breach database for compromised credentials.</p>

      <div class="input-group">
        <input type="text" id="searchQuery" placeholder="Enter company domain (e.g., corp.com)" />
        <button id="searchBtn" class="primary-btn">Search</button>
      </div>

      <div id="results" class="log-box" style="height: 250px; text-align: left;" aria-live="polite">
        Waiting for query...
      </div>

      <div id="assessment" style="display:none; margin-top: 20px;">
        <h3>Risk Assessment</h3>
        <p>Based on the leak, what is the immediate threat level?</p>
        <div id="options">
          <button class="secondary-btn" onclick="submitAssessment('Low')">Low (Hashed, no salts)</button>
          <button class="secondary-btn" onclick="submitAssessment('Critical')">Critical (Plaintext passwords)</button>
          <button class="secondary-btn" onclick="submitAssessment('Medium')">Medium (Emails only)</button>
        </div>
      </div>
    </div>

    <script type="module" src="js/auth.js"></script>
    <script src="js/common.js"></script>
    <script type="module" src="js/darkweb.js"></script>
  </body>
</html>
