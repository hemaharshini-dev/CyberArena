<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Challenge - CyberArena</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .daily-card {
        background: rgba(0,0,0,0.6);
        border: 1px solid var(--neon-cyan);
        border-radius: 4px;
        padding: 28px;
        margin: 20px 0;
        text-align: left;
        animation: phishFlash 0.4s ease-out;
      }
      .daily-card h3 {
        color: var(--neon-cyan);
        font-family: var(--font-cyber);
        margin-top: 0;
        font-size: 14px;
        letter-spacing: 1px;
      }
      .daily-card p { font-size: 14px; color: #c0c8d0; line-height: 1.8; }

      .choice-btn {
        display: block;
        width: 100%;
        background: transparent;
        border: 1px solid #333;
        color: #c0c8d0;
        padding: 13px 18px;
        text-align: left;
        font-family: var(--font-main);
        font-size: 13px;
        clip-path: none;
        text-transform: none;
        font-weight: normal;
        cursor: pointer;
        transition: 0.2s;
        border-radius: 3px;
        margin-bottom: 8px;
      }
      .choice-btn:hover:not(:disabled) { border-color: var(--neon-cyan); color: var(--neon-cyan); background: rgba(0,243,255,0.05); }
      .choice-btn.correct { border-color: var(--neon-green) !important; color: var(--neon-green) !important; background: rgba(57,255,20,0.07) !important; }
      .choice-btn.wrong   { border-color: #ff003c !important; color: #ff6b6b !important; background: rgba(255,0,60,0.07) !important; }

      .timer-ring {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }
      .timer-bar {
        flex: 1;
        height: 6px;
        background: #111;
        border: 1px solid #333;
        border-radius: 3px;
        overflow: hidden;
      }
      .timer-fill {
        height: 100%;
        background: var(--neon-cyan);
        box-shadow: 0 0 6px var(--neon-cyan);
        transition: width 1s linear, background 0.3s;
      }

      .lb-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px;
        border-bottom: 1px solid #1a1a1a;
        font-size: 13px;
      }
      .lb-row:first-child { border-top: 1px solid #1a1a1a; }
      .lb-rank { color: #555; width: 24px; }
      .lb-name { flex: 1; padding: 0 10px; }
      .lb-xp   { color: var(--neon-cyan); }
      .lb-time { color: #555; font-size: 11px; margin-left: 10px; }
      .lb-row.me { background: rgba(0,243,255,0.05); }
      .lb-row.me .lb-name { color: var(--neon-cyan); }

      .type-badge {
        display: inline-block;
        font-size: 10px;
        padding: 2px 8px;
        border: 1px solid var(--neon-magenta);
        color: var(--neon-magenta);
        border-radius: 2px;
        margin-bottom: 14px;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .already-played {
        text-align: center;
        padding: 40px 20px;
        border: 1px solid #333;
        border-radius: 4px;
      }
      .already-played h2 { color: var(--neon-cyan); font-family: var(--font-cyber); }
      .countdown { font-size: 28px; color: var(--neon-magenta); font-family: var(--font-cyber); margin: 10px 0; }

      .explain-box {
        background: rgba(0,243,255,0.04);
        border-left: 3px solid var(--neon-cyan);
        padding: 12px 16px;
        margin-top: 16px;
        font-size: 13px;
        color: #c0c8d0;
        border-radius: 2px;
        animation: slideIn 0.3s ease-out;
      }
    </style>
  </head>
  <body>
    <div class="container" style="max-width:800px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <button class="back-btn" onclick="goHome()">← Hub</button>
        <span style="color:var(--neon-magenta);font-family:var(--font-cyber);font-size:12px;letter-spacing:2px;">📅 DAILY CHALLENGE</span>
      </div>

      <h1>⚡ Daily Challenge</h1>
      <p style="color:#888;font-size:13px;">One question per day. Faster correct answers earn more XP. Compete on the daily leaderboard.</p>

      <div id="mainArea"></div>

      <div style="margin-top:30px;">
        <h2 style="font-family:var(--font-cyber);color:var(--neon-cyan);font-size:16px;">🏆 Today's Leaderboard</h2>
        <div id="leaderboardArea"><p style="color:#555;font-size:13px;">Loading...</p></div>
      </div>
    </div>

    <script type="module">
      import { auth } from "./js/firebase.js";
      import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
      import { updateXP } from "./js/xp.js";
      import { getTodayChallenge, hasPlayedToday, submitDailyScore, getDailyLeaderboard, getTodayKey } from "./js/daily.js";

      let currentUser = null;
      let timerInterval = null;
      let secondsElapsed = 0;
      let timerMax = 30;

      onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "login.html"; return; }
        currentUser = user;
        await init();
      });

      async function init() {
        const played = await hasPlayedToday();
        if (played) {
          showAlreadyPlayed();
        } else {
          showChallenge();
        }
        loadLeaderboard();
      }

      function showChallenge() {
        const q = getTodayChallenge();
        const typeLabels = {
          phishing: "🕵️ Phishing", social: "🎭 Social Engineering",
          password: "🔑 Password Security", malware: "🦠 Malware",
          smishing: "📱 Smishing", mfa: "🔐 MFA", darkweb: "🌐 Dark Web",
          quishing: "📷 Quishing"
        };

        const area = document.getElementById("mainArea");
        area.innerHTML = `
          <div class="daily-card">
            <span class="type-badge">${typeLabels[q.type] || q.type}</span>
            <div class="timer-ring">
              <span id="timerLabel" style="font-size:12px;color:#555;min-width:40px;">30s</span>
              <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%;"></div></div>
              <span style="font-size:11px;color:#555;">faster = more XP</span>
            </div>
            <h3>Today's Question</h3>
            <p>${q.question}</p>
            <div id="choicesArea" style="margin-top:20px;"></div>
            <div id="explainArea"></div>
          </div>`;

        const choicesArea = document.getElementById("choicesArea");
        q.choices.forEach((choice, i) => {
          const btn = document.createElement("button");
          btn.className = "choice-btn";
          btn.innerText = choice.text;
          btn.onclick = () => handleAnswer(choice, q, btn);
          choicesArea.appendChild(btn);
        });

        startTimer();
      }

      function startTimer() {
        secondsElapsed = 0;
        timerInterval = setInterval(() => {
          secondsElapsed++;
          const pct = Math.max(0, ((timerMax - secondsElapsed) / timerMax) * 100);
          const fill = document.getElementById("timerFill");
          const label = document.getElementById("timerLabel");
          if (!fill) { clearInterval(timerInterval); return; }
          fill.style.width = pct + "%";
          fill.style.background = pct > 50 ? "var(--neon-cyan)" : pct > 25 ? "#fbbf24" : "#ff003c";
          fill.style.boxShadow = `0 0 6px ${pct > 50 ? "var(--neon-cyan)" : pct > 25 ? "#fbbf24" : "#ff003c"}`;
          label.innerText = (timerMax - secondsElapsed) + "s";
          if (secondsElapsed >= timerMax) {
            clearInterval(timerInterval);
            handleTimeout(getTodayChallenge());
          }
        }, 1000);
      }

      async function handleAnswer(choice, q, btn) {
        clearInterval(timerInterval);
        document.querySelectorAll(".choice-btn").forEach(b => {
          b.disabled = true;
          if (b === btn) b.classList.add(choice.correct ? "correct" : "wrong");
          // Reveal correct answer
          const idx = Array.from(document.querySelectorAll(".choice-btn")).indexOf(b);
          if (q.choices[idx]?.correct) b.classList.add("correct");
        });

        document.getElementById("explainArea").innerHTML = `
          <div class="explain-box">
            <strong style="color:${choice.correct ? 'var(--neon-green)' : '#ff6b6b'};">
              ${choice.correct ? "✅ Correct!" : "❌ Wrong!"}
            </strong><br>${choice.explain}
          </div>`;

        const xpEarned = await submitDailyScore(choice.correct, secondsElapsed);
        await updateXP(xpEarned, null);

        setTimeout(() => {
          showResult(choice.correct, xpEarned, secondsElapsed);
          loadLeaderboard();
        }, 2000);
      }

      async function handleTimeout(q) {
        document.querySelectorAll(".choice-btn").forEach((b, i) => {
          b.disabled = true;
          if (q.choices[i]?.correct) b.classList.add("correct");
        });
        document.getElementById("explainArea").innerHTML = `
          <div class="explain-box" style="border-color:#ff003c;">
            <strong style="color:#ff6b6b;">⏱️ Time's up!</strong><br>
            ${q.choices.find(c => c.correct)?.explain || ""}
          </div>`;
        const xpEarned = await submitDailyScore(false, timerMax);
        await updateXP(xpEarned, null);
        setTimeout(() => { showResult(false, xpEarned, timerMax); loadLeaderboard(); }, 2000);
      }

      function showResult(correct, xp, time) {
        const area = document.getElementById("mainArea");
        area.innerHTML = `
          <div style="text-align:center;padding:30px;border:1px solid ${correct ? 'var(--neon-green)' : '#ff003c'};border-radius:4px;background:${correct ? 'rgba(57,255,20,0.04)' : 'rgba(255,0,60,0.04)'};">
            <div style="font-size:48px;margin-bottom:10px;">${correct ? "🎯" : "💀"}</div>
            <h2 style="font-family:var(--font-cyber);color:${correct ? 'var(--neon-green)' : '#ff003c'};">
              ${correct ? "Correct!" : "Wrong Answer"}
            </h2>
            <p style="color:#888;font-size:13px;">Time taken: <strong style="color:#c0c8d0;">${time}s</strong></p>
            <p style="color:var(--neon-cyan);font-size:16px;margin:10px 0;">+${xp} XP earned</p>
            <p style="color:#555;font-size:12px;">Come back tomorrow for a new challenge!</p>
            <button class="secondary-btn" onclick="goHome()" style="clip-path:none;margin-top:16px;">← Back to Hub</button>
          </div>`;
      }

      function showAlreadyPlayed() {
        const area = document.getElementById("mainArea");
        const now = new Date();
        const midnight = new Date(now);
        midnight.setHours(24, 0, 0, 0);
        const diff = midnight - now;
        const hh = String(Math.floor(diff / 3600000)).padStart(2,'0');
        const mm = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
        const ss = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');

        area.innerHTML = `
          <div class="already-played">
            <div style="font-size:40px;margin-bottom:10px;">✅</div>
            <h2>Already Completed Today!</h2>
            <p style="color:#888;font-size:13px;">You've completed today's challenge. Next challenge in:</p>
            <div class="countdown" id="countdown">${hh}:${mm}:${ss}</div>
            <p style="color:#555;font-size:12px;">Check the leaderboard below to see how you rank today.</p>
          </div>`;

        // Live countdown
        setInterval(() => {
          const n = new Date();
          const m = new Date(n); m.setHours(24,0,0,0);
          const d = m - n;
          const h2 = String(Math.floor(d/3600000)).padStart(2,'0');
          const m2 = String(Math.floor((d%3600000)/60000)).padStart(2,'0');
          const s2 = String(Math.floor((d%60000)/1000)).padStart(2,'0');
          const el = document.getElementById("countdown");
          if (el) el.innerText = `${h2}:${m2}:${s2}`;
        }, 1000);
      }

      async function loadLeaderboard() {
        const area = document.getElementById("leaderboardArea");
        try {
          const rows = await getDailyLeaderboard();
          if (!rows.length) { area.innerHTML = `<p style="color:#555;font-size:13px;">No scores yet today — be the first!</p>`; return; }
          const medals = ["🥇","🥈","🥉"];
          area.innerHTML = rows.map((r, i) => {
            const name = r.email ? r.email.split('@')[0] : "Anonymous";
            const isMe = currentUser && r.uid === currentUser.uid;
            return `<div class="lb-row${isMe ? ' me' : ''}">
              <span class="lb-rank">${medals[i] || (i+1)}</span>
              <span class="lb-name">${name}${isMe ? ' <span style="color:#555;font-size:10px;">(you)</span>' : ''}</span>
              <span class="lb-time">${r.timeTaken}s</span>
              <span class="lb-xp">+${r.xp} XP</span>
            </div>`;
          }).join("");
        } catch(e) {
          area.innerHTML = `<p style="color:#555;font-size:13px;">Leaderboard unavailable.</p>`;
        }
      }
    </script>
    <script src="js/common.js"></script>
  </body>
</html>
