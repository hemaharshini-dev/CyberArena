<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Password Lab - CyberArena</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <button class="back-btn" onclick="goHome()">← Back</button>
      <h2>🛡️ Interactive Password Lab</h2>
      <p>Test your password strength and see how long it takes to crack!</p>

      <div class="input-group">
        <input type="password" id="passwordInput" placeholder="Enter a password..." />
        <button id="toggleView">👁️</button>
      </div>

      <div id="strengthMeter" class="strength-meter">
        <div id="strengthFill"></div>
      </div>
      <p id="strengthText">Strength: Weak</p>

      <div class="stats">
        <p id="crackTime">⏱️ Time to crack: 0 seconds</p>
        <p id="entropyScore">🔑 Entropy: 0 bits</p>
      </div>

      <div id="feedback" class="feedback-list"></div>

      <hr />

      <div class="mfa-sim">
        <h3>MFA Simulation</h3>
        <button id="simulateMFA" class="secondary-btn">Simulate MFA Prompt</button>
        <div id="mfaPrompt" style="display:none;" class="modal">
            <div class="modal-content">
                <h3>📲 MFA Verification</h3>
                <p>A code was sent to your phone. Enter it here:</p>
                <input type="text" id="mfaCode" placeholder="123456" maxlength="6" />
                <button id="verifyMFA">Verify</button>
            </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { auth } from "./js/firebase.js";
      import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

      onAuthStateChanged(auth, (user) => {
        if (!user) {
          window.location.href = "login.html";
        }
      });
    </script>
    <script src="js/common.js"></script>
    <script type="module" src="js/password.js"></script>
  </body>
</html>
