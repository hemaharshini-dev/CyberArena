<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - CyberArena</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="auth-box">
      <h2>🛡️ CyberArena</h2>
      <p class="subtitle">Train. Detect. Defend.</p>

      <div class="form-group">
        <input id="email" type="email" placeholder="Email Address" />
        <input id="password" type="password" placeholder="Password" />
      </div>

      <div class="button-group">
        <button class="primary-btn" id="loginBtn">Login</button>
        <button class="secondary-btn" id="registerBtn">Create Account</button>
      </div>

      <div class="divider"><span>OR</span></div>

      <button class="google-btn" id="googleBtn">
        Sign in with Google
      </button>
    </div>

    <script type="module" src="js/auth.js"></script>
  </body>
</html>
